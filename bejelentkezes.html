<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bejelentkezés</title>
    <style>
        body {
            text-align: center;
            padding: 50px;
            background-color: rgb(36, 51, 51);
            color: white;
            font-family: Arial, sans-serif;
        }
        .bejelentkezes-form {
            width: 300px;
            margin: 0 auto;
            padding: 30px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }
        .bejelentkezes-form input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background-color: rgba(255, 255, 255, 0.8);
        }
        .bejelentkezes-form button {
            width: 85%;
            padding: 12px;
            background-color: #ff6a00;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .bejelentkezes-form button:hover {
            background-color: #e05d00;
        }
        h2 {
            color: #ff7700;
            margin-bottom: 5px;
        }
        h3 {
            color: #ccc;
            margin-top: 0;
            font-weight: normal;
            margin-bottom: 30px;
        }
        #error-message {
            color: #ff4444;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="bejelentkezes-form">
        <h2>Bejelentkezés</h2>
        <h3>Csak akkor tudsz bejelentkezni, ha van hozzáférésed!</h3>
        <input type="text" id="felhasznalo" placeholder="Felhasználónév" required><br>
        <input type="password" id="jelszo" placeholder="Jelszó" required><br>
        <button onclick="bejel()">Belépés</button>
        <div id="error-message"></div>
    </div>

    <script>
        async function bejel() {
            const felhasznalo = document.getElementById('felhasznalo').value.trim();
            const jelszo = document.getElementById('jelszo').value.trim();
            const errorDisplay = document.getElementById('error-message');

            errorDisplay.textContent = '';
            
            if (!felhasznalo || !jelszo) {
                errorDisplay.textContent = 'Kérjük, töltsd ki mindkét mezőt!';
                return;
            }

            try {
                const response = await fetch('http://localhost:5156/api/Auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        Username: felhasznalo,
                        Password: jelszo
                    })
                });

                if (response.ok) {
                    window.location.href = "admin.html";
                } else {
                    const error = await response.json();
                    errorDisplay.textContent = error || "Hibás felhasználónév vagy jelszó!";
                }
            } catch (error) {
                console.error('Bejelentkezési hiba:', error);
                errorDisplay.textContent = "Hiba történt a kapcsolat során";
            }
        }

        // Enter key support
        document.getElementById('jelszo').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                bejel();
            }
        });
    </script>
</body>
</html>
