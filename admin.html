<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        header {
            background-color: #222;
            color: white;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #ff7700;
            border-bottom: 2px solid #ff7700;
            padding-bottom: 10px;
            margin-top: 30px;
        }
        .summary {
            background-color: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 18px;
            line-height: 1.6;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th {
            background-color: #ff7700;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        button {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #c82333;
        }
        .login-message {
            text-align: center;
            margin-top: 100px;
            font-size: 24px;
        }
        .login-btn {
            background-color: #ff7700;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .login-btn:hover {
            background-color: #e05d00;
        }
        .hidden {
            display: none;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Lőtér Admin Panel</h1>
        </div>
    </header>

    <div class="container">
        <div id="login-message" class="login-message">
            <p>Bejelentkezés szükséges az admin felület eléréséhez</p>
            <button class="login-btn" onclick="window.location.href='bejelentkezes.html'">Bejelentkezés</button>
        </div>

        <div id="loading" class="loading">
            <p>Adatok betöltése...</p>
        </div>

        <div id="admin-content" class="hidden">
            <h1>Ügyfélkezelés</h1>
            <div id="summary" class="summary"></div>
            <table id="appointments-table">
                <thead>
                    <tr>
                        <th>Név</th>
                        <th>Dátum</th>
                        <th>Időpont</th>
                        <th>Csomag</th>
                        <th>Műveletek</th>
                    </tr>
                </thead>
                <tbody id="appointments-list"></tbody>
            </table>

            <h1>Dolgozók kezelése</h1>
            <div id="instructors-summary" class="summary"></div>
            <table id="instructors-table">
                <thead>
                    <tr>
                        <th>Név</th>
                        <th>Felvétel dátuma</th>
                        <th>Aktív ügyfelek</th>
                        <th>Email</th>
                        <th>Műveletek</th>
                    </tr>
                </thead>
                <tbody id="instructors-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:5156/api";
        let isAuthenticated = false;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Check if user is authenticated (in a real app, you'd check a token)
                await loadData();
                showAdminContent();
            } catch (error) {
                console.error('Error:', error);
                showLoginMessage();
            }
        });

        async function loadData() {
            showLoading();
            
            try {
                const [appointments, instructors] = await Promise.all([
                    fetchAppointments(),
                    fetchInstructors()
                ]);
                
                renderAppointments(appointments);
                renderInstructors(instructors, appointments);
                
                return true;
            } catch (error) {
                console.error('Data loading error:', error);
                throw error;
            } finally {
                hideLoading();
            }
        }

        async function fetchAppointments() {
            const response = await fetch(`${API_BASE}/Appointments?$include=Instructor,Package`);
            if (!response.ok) throw new Error("Failed to load appointments");
            return await response.json();
        }

        async function fetchInstructors() {
            const response = await fetch(`${API_BASE}/Instructors`);
            if (!response.ok) throw new Error("Failed to load instructors");
            return await response.json();
        }

        function renderAppointments(appointments) {
            const today = new Date();
            const currentMonth = today.getMonth();
            const nextMonth = (currentMonth + 1) % 12;
            
            // Filter future appointments
            const futureAppointments = appointments.filter(a => new Date(a.startTime) >= today);
            
            const thisMonthApps = futureAppointments.filter(a => 
                new Date(a.startTime).getMonth() === currentMonth
            );
            
            const nextMonthApps = futureAppointments.filter(a => 
                new Date(a.startTime).getMonth() === nextMonth
            );
            
            document.getElementById('summary').innerHTML = `
                <strong>Összegzés:</strong><br>
                Ebben a hónapban: <strong>${thisMonthApps.length}</strong> aktív időpont<br>
                Következő hónapban: <strong>${nextMonthApps.length}</strong> időpont
            `;
            
            const tbody = document.getElementById('appointments-list');
            tbody.innerHTML = '';
            
            futureAppointments.forEach(appointment => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${appointment.clientName}</td>
                    <td>${new Date(appointment.startTime).toLocaleDateString('hu-HU')}</td>
                    <td>${formatTimeRange(appointment.startTime, appointment.endTime)}</td>
                    <td>${appointment.package?.name || 'Ismeretlen'}</td>
                    <td><button onclick="deleteAppointment(${appointment.id})">Törlés</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderInstructors(instructors, appointments) {
            const today = new Date();
            const activeAppointments = appointments.filter(a => new Date(a.startTime) >= today);
            
            document.getElementById('instructors-summary').innerHTML = `
                <strong>Összegzés:</strong><br>
                Aktív oktatók száma: <strong>${instructors.length}</strong>
            `;
            
            const tbody = document.getElementById('instructors-list');
            tbody.innerHTML = '';
            
            instructors.forEach(instructor => {
                const instructorApps = activeAppointments.filter(a => 
                    a.instructorId === instructor.id
                );
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${instructor.name}</td>
                    <td>${instructor.hireDate ? new Date(instructor.hireDate).toLocaleDateString('hu-HU') : 'N/A'}</td>
                    <td>${instructorApps.length}</td>
                    <td>${instructor.email}</td>
                    <td><button onclick="deleteInstructor(${instructor.id}, '${instructor.name}')">Törlés</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function formatTimeRange(start, end) {
            const startTime = new Date(start).toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit' });
            const endTime = new Date(end).toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit' });
            return `${startTime} - ${endTime}`;
        }

        async function deleteAppointment(id) {
            if (!confirm('Biztosan törölni szeretnéd ezt az időpontot?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/Appointments/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    await loadData();
                    alert('Időpont sikeresen törölve!');
                } else {
                    throw new Error('Törlés sikertelen');
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('Hiba történt a törlés során');
            }
        }

        async function deleteInstructor(id, name) {
            if (!confirm(`Biztosan törölni szeretnéd a(z) ${name} dolgozót?`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/Instructors/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    await loadData();
                    alert('Dolgozó sikeresen törölve!');
                } else {
                    throw new Error('Törlés sikertelen');
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('Hiba történt a törlés során');
            }
        }

        function showAdminContent() {
            document.getElementById('login-message').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            isAuthenticated = true;
        }

        function showLoginMessage() {
            document.getElementById('login-message').classList.remove('hidden');
            document.getElementById('admin-content').classList.add('hidden');
            isAuthenticated = false;
        }

        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }
    </script>
</body>
</html>
