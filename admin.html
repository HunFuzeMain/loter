<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Ügyfélkezelés</title>

</head>
<body>
  <h1>Ügyfélkezelő rendszer</h1>
  <div id="összegzés"></div>
  <table id="ugyfelektabla">
    <thead>
        <tr>
          <th id="thugyfel">Név</th>
          <th id="thugyfel">Dátum</th>
          <th id="thugyfel">Időpont</th>
          <th id="thugyfel">Csomag</th>
          <th id="thugyfel">Oktató</th>
          <th id="thugyfel">Törlés</th>
        </tr>
      </thead>
      
    <tbody id="ugyfelLista">
      <!-- Ügyfelek ide kerülnek -->
    </tbody>
  </table>

  <br>
  <br>
  <br>



  <h1>Dolgozók kezelése </h1>
  <div id="osszesdolgozo"></div>
  <table id="dolgozoktabla">
    <thead>
      <tr>
        <th id="thdolgozo">Név</th>
        <th id="thdolgozo">Felvétel dátuma</th>
        <th id="thdolgozo">jelenlegi ügyfeleinek száma</th>
        <th id="thdolgozo">Törölni szeretnéd?</th>
      </tr>
    </thead>
    <tbody id="dolgozolista">
      <!-- dolgozok ide kerülnek -->
    </tbody>
  </table>





































  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      background-color: #f4f4f4;
    }
    h1 {
      text-align: center;
    }
    #összegzés {
      margin-bottom: 10px;
      font-size: 25px;
    }
    #osszesdolgozo{
        margin-bottom: 10px;
        font-size: 25px;
    }
    #ugyfelektabla {
      width: 100%;
      border-collapse: collapse;
      background: rgb(255, 255, 255);
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    #dolgozoktabla{
      width: 100%;
      border-collapse: collapse;
      background: rgb(255, 255, 255);
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 1rem;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    #thugyfel{
      background-color: #ff7700;
      color: white;
    }
    #thdolgozo{
        background-color: rgb(58, 171, 232);
        color: white;
    }
    button {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 15px 25px;
      cursor: pointer;
      border-radius: 111px;
    }
    button:hover {
      background-color: #c82333;
    }
  </style>
 
 <script>
    const BASE_URL = "http://localhost:5156"; // ✅ your backend port
    
    let appointments = [];
    let instructors = [];
    
    async function betoltUgyfelek() {
      try {
        const res = await fetch(`${BASE_URL}/api/Appointments`);
        if (!res.ok) throw new Error("Nem sikerült lekérni az időpontokat.");
        appointments = await res.json();
    
        appointments.sort((a, b) => new Date(a.startTime) - new Date(b.startTime));
    
        const tbody = document.getElementById('ugyfelLista');
        tbody.innerHTML = '';
    
        const now = new Date();
        const currentMonth = now.getMonth();
        const nextMonth = (currentMonth + 1) % 12;
    
        const thisMonth = appointments.filter(u => new Date(u.startTime).getMonth() === currentMonth);
        const nextMonthAppointments = appointments.filter(u => new Date(u.startTime).getMonth() === nextMonth);
    
        document.getElementById('összegzés').innerText =
          `Ebben a hónapban még ${thisMonth.length} ügyfél van vissza.\nKövetkező hónapra ${nextMonthAppointments.length} ügyfélnek van időpontja.`;
    
        for (const appointment of appointments) {
            const startDate = new Date(appointment.startTime);
            const endDate = new Date(appointment.endTime);
            const date = startDate.toLocaleDateString();
            const time = `${startDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} - ${endDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${appointment.clientName}</td>
                <td>${date}</td>
                <td>${time}</td>
                <td>${appointment.package}</td>
                <td>${appointment.instructor}</td>
                <td><button onclick="torolUgyfel(${appointment.id})">Törlés</button></td>
            `;

          tbody.appendChild(row);
        }
      } catch (err) {
        console.error("Hiba az ügyfelek betöltésekor:", err);
      }
    }
    
    async function torolUgyfel(id) {
      if (!confirm("Biztosan törölni szeretnéd ezt az időpontot?")) return;
    
      const res = await fetch(`${BASE_URL}/api/Appointments/${id}`, { method: 'DELETE' });
      if (res.ok) {
        alert("Időpont törölve.");
        await betoltUgyfelek();
        await betoltDolgozo();
      } else {
        alert("Hiba történt az időpont törlése során.");
      }
    }
    
    async function betoltDolgozo() {
      try {
        const res = await fetch(`${BASE_URL}/api/Instructors`);
        if (!res.ok) throw new Error("Nem sikerült lekérni az oktatókat.");
        instructors = await res.json();
    
        const tbody = document.getElementById('dolgozolista');
        tbody.innerHTML = '';
    
        document.getElementById('osszesdolgozo').innerText = `Jelenleg: ${instructors.length} munkatársunk van.`;
    
        for (const ins of instructors) {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${ins.name}</td>
            <td>${ins.hireDate ? new Date(ins.hireDate).toLocaleDateString() : "–"}</td>
            <td>${ins.activeAppointmentsCount} ügyfél</td>
            <td><button onclick="torolDolgozo(${ins.id})">Törlés</button></td>
          `;
          tbody.appendChild(row);
        }
      } catch (err) {
        console.error("Hiba a dolgozók betöltésekor:", err);
      }
    }
    
    async function torolDolgozo(id) {
      if (!confirm("Biztosan törölni szeretnéd ezt az oktatót?")) return;
    
      const res = await fetch(`${BASE_URL}/api/Instructors/${id}`, { method: 'DELETE' });
      if (res.ok) {
        alert("Oktató törölve.");
        await betoltDolgozo();
        await betoltUgyfelek();
      } else {
        const msg = await res.text();
        alert("Hiba: " + msg);
      }
    }
    
    betoltUgyfelek();
    betoltDolgozo();

    setInterval(() => {
        betoltUgyfelek();
        betoltDolgozo();
    }, 10000);
    </script>
    
</body>
</html>
